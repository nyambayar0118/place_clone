<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>r/place clone</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #1f2233 0%, #0d0f1a 60%);
            color: #e4e4ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        header {
            width: 100%;
            max-width: 720px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: #6ee7b7;
        }

        #user-pill {
            display: none;
            background: rgba(110, 231, 183, 0.1);
            border: 1px solid rgba(110, 231, 183, 0.3);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        #user-pill.visible {
            display: flex;
        }

        #user-pill .username {
            font-weight: 600;
            color: #6ee7b7;
        }

        #user-pill button {
            background: transparent;
            border: 0;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
        }

        #user-pill button:hover {
            color: #fff;
        }

        #canvas-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #canvas-wrap {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        #canvas {
            display: block;
            width: 600px;
            height: 600px;
            image-rendering: pixelated;
            cursor: crosshair;
        }

        #position-indicator {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }

        #canvas-wrap:hover #position-indicator {
            opacity: 1;
        }

        #palette {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .swatch {
            width: 28px;
            height: 28px;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s, border-color 0.1s;
        }

        .swatch:hover {
            transform: scale(1.15);
        }

        .swatch.selected {
            border-color: #fff;
            transform: scale(1.15);
        }

        #cooldown-bar {
            width: 600px;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        #cooldown-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6ee7b7, #34d399);
            transition: width 1s linear;
        }

        #status-line {
            font-size: 13px;
            color: #888;
            min-height: 18px;
            text-align: center;
        }

        #status-line.error {
            color: #f87171;
        }

        #status-line.ok {
            color: #6ee7b7;
        }

        /* Auth modal overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #auth-overlay.visible {
            display: flex;
        }

        #auth-card {
            background: #1a1d2e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        #auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 0;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .auth-tab.active {
            color: #6ee7b7;
            border-bottom-color: #6ee7b7;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: #0d0f1a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e4e4ef;
            border-radius: 6px;
            font-size: 14px;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #6ee7b7;
        }

        .auth-form button {
            width: 100%;
            padding: 10px;
            background: #6ee7b7;
            color: #0d0f1a;
            border: 0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
        }

        .auth-form button:hover {
            background: #34d399;
        }

        #auth-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            border: 0;
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }

        #auth-error {
            color: #f87171;
            font-size: 12px;
            margin-top: 8px;
            min-height: 16px;
        }

        #login-prompt {
            background: #6ee7b7;
            color: #0d0f1a;
            border: 0;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        #login-prompt:hover {
            background: #34d399;
        }

        @media (max-width: 680px) {
            #canvas {
                width: 90vw;
                height: 90vw;
                max-width: 600px;
                max-height: 600px;
            }

            #cooldown-bar {
                width: 90vw;
                max-width: 600px;
            }

            .swatch {
                width: 5vw;
                height: 5vw;
                max-width: 28px;
                max-height: 28px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>r/<span>place</span></h1>
        <button id="login-prompt">log in to place pixels</button>
        <div id="user-pill">
            <span>signed in as <span class="username"></span></span>
            <button id="logout">log out</button>
        </div>
    </header>

    <div id="canvas-area">
        <div id="canvas-wrap">
            <canvas id="canvas" width="100" height="100"></canvas>
            <div id="position-indicator">(0, 0)</div>
        </div>
        <div id="palette"></div>
        <div id="cooldown-bar">
            <div id="cooldown-fill"></div>
        </div>
        <div id="status-line"></div>
    </div>

    <div id="auth-overlay">
        <div id="auth-card" style="position: relative;">
            <button id="auth-close" type="button">×</button>
            <div id="auth-tabs">
                <button class="auth-tab active" data-form="login">log in</button>
                <button class="auth-tab" data-form="register">register</button>
            </div>
            <form id="login-form" class="auth-form active">
                <input name="username" placeholder="username" required>
                <input name="password" type="password" placeholder="password" required>
                <button type="submit">log in</button>
            </form>
            <form id="register-form" class="auth-form">
                <input name="username" placeholder="username" required>
                <input name="email" type="email" placeholder="email" required>
                <input name="password" type="password" placeholder="password" required minlength="8">
                <button type="submit">register</button>
            </form>
            <div id="auth-error"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/ws.js"></script>
    <script>
        // ============ UI wiring (was inline before) ============
        (async function () {
            await Canvas.init();
            Auth.init();
            WS.connect();
            UI.init();
        })();

        const UI = (() => {
            const overlay = document.getElementById('auth-overlay');
            const loginBtn = document.getElementById('login-prompt');
            const closeBtn = document.getElementById('auth-close');
            const logoutBtn = document.getElementById('logout');
            const userPill = document.getElementById('user-pill');
            const usernameEl = userPill.querySelector('.username');
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            function openAuth() { overlay.classList.add('visible'); }
            function closeAuth() {
                overlay.classList.remove('visible');
                document.getElementById('auth-error').textContent = '';
            }

            function syncAuthState() {
                const t = API.token();
                if (t) {
                    // Decode JWT payload to display username (no verification, just parsing)
                    try {
                        const payload = JSON.parse(atob(t.split('.')[1]));
                        usernameEl.textContent = payload.username || 'user';
                    } catch { usernameEl.textContent = 'user'; }
                    loginBtn.style.display = 'none';
                    userPill.classList.add('visible');
                } else {
                    loginBtn.style.display = '';
                    userPill.classList.remove('visible');
                }
            }

            function init() {
                loginBtn.addEventListener('click', openAuth);
                closeBtn.addEventListener('click', closeAuth);
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeAuth();
                });
                logoutBtn.addEventListener('click', () => {
                    API.clearToken();
                    syncAuthState();
                    WS.connect();   // reconnect as anonymous
                });
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const which = tab.dataset.form;
                        tabs.forEach(t => t.classList.toggle('active', t === tab));
                        forms.forEach(f => f.classList.toggle('active', f.id === which + '-form'));
                        document.getElementById('auth-error').textContent = '';
                    });
                });

                // Hover position indicator
                const canvas = document.getElementById('canvas');
                const indicator = document.getElementById('position-indicator');
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) * (100 / rect.width));
                    const y = Math.floor((e.clientY - rect.top) * (100 / rect.height));
                    indicator.textContent = `(${x}, ${y})`;
                });

                syncAuthState();
                window.UI_syncAuthState = syncAuthState;
                window.UI_closeAuth = closeAuth;
            }

            return { init };
        })();
    </script>
</body>

</html>
